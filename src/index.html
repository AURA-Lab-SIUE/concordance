<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concordance</title>
    <link rel="stylesheet" href="style.css" />
    <!-- PDF.js and mammoth.js for in-browser document parsing. v0.2 will bundle these locally. -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js"></script>
    <script>
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js";
      }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.2/mammoth.browser.min.js"></script>
  </head>
  <body>
    <header>
      <div class="brand">
        <h1>Concordance</h1>
        <p class="subtitle">Topic-agnostic term checker. AURA Lab in collaboration with SIM DAD LLC.</p>
      </div>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="check" role="tab" aria-selected="true">Check</button>
      <button class="tab" data-tab="extract" role="tab" aria-selected="false">Extract</button>
    </nav>

    <main>
      <!-- ====================== CHECK MODE ====================== -->
      <section id="tab-check" class="tab-panel active" role="tabpanel">
        <fieldset>
          <legend>Wordlist</legend>
          <label class="radio-row">
            <input type="radio" name="preset" value="bundled-nsf" checked />
            <span>
              <strong>NSF 2025 Leaked</strong>
              <small>Bundled. 104 terms. The NSF leaked decision-tree list.</small>
            </span>
          </label>
          <label class="radio-row">
            <input type="radio" name="preset" value="bundled-aura" />
            <span>
              <strong>AURA Lab Extended</strong>
              <small>Bundled. 447 terms. Leaked list plus community-compiled defensive additions.</small>
            </span>
          </label>
          <label class="radio-row">
            <input type="radio" name="preset" value="custom" />
            <span>
              <strong>Custom preset (JSON)</strong>
              <small>Upload your own preset file in Concordance JSON format.</small>
              <input type="file" id="custom-preset-file" accept=".json" hidden />
              <button type="button" id="custom-preset-btn" class="file-btn">Choose file...</button>
              <span id="custom-preset-status" class="file-status"></span>
            </span>
          </label>
          <label class="radio-row">
            <input type="radio" name="preset" value="extracted" />
            <span>
              <strong>Extract from a governing document</strong>
              <small>Upload a CFP, RFP, job posting, or any governing text. Concordance will tokenize it into a preset.</small>
              <input type="file" id="extract-source-file" accept=".pdf,.docx,.txt" hidden />
              <button type="button" id="extract-source-btn" class="file-btn">Choose file...</button>
              <span id="extract-source-status" class="file-status"></span>
            </span>
          </label>
        </fieldset>

        <fieldset>
          <legend>Mode</legend>
          <label class="radio-row">
            <input type="radio" name="mode" value="flag-if-found" checked />
            <span>
              <strong>Flag if found</strong>
              <small>Hits are terms present in your text. Use for compliance-style review.</small>
            </span>
          </label>
          <label class="radio-row">
            <input type="radio" name="mode" value="flag-if-missing" />
            <span>
              <strong>Flag if missing</strong>
              <small>Hits are wordlist terms NOT in your text. Use to check that your proposal uses the funder's vocabulary.</small>
            </span>
          </label>
        </fieldset>

        <fieldset>
          <legend>Text to check</legend>
          <textarea id="check-text" rows="12" placeholder="Paste your proposal text, manuscript draft, or any content to scan..."></textarea>
          <div class="upload-line">
            <input type="file" id="check-doc-file" accept=".pdf,.docx,.txt" hidden />
            <button type="button" id="check-doc-btn" class="file-btn">Or upload a document (PDF, DOCX, TXT)</button>
            <span id="check-doc-status" class="file-status"></span>
          </div>
        </fieldset>

        <div class="actions">
          <button type="button" id="check-run" class="primary">Check</button>
          <button type="button" id="check-clear" class="secondary">Clear</button>
        </div>

        <div id="check-results" class="results"></div>
      </section>

      <!-- ====================== EXTRACT MODE ====================== -->
      <section id="tab-extract" class="tab-panel" role="tabpanel" hidden>
        <fieldset>
          <legend>Source document</legend>
          <textarea id="extract-text" rows="10" placeholder="Paste a CFP, RFP, job posting, journal scope statement, or any governing document..."></textarea>
          <div class="upload-line">
            <input type="file" id="extract-doc-file" accept=".pdf,.docx,.txt" hidden />
            <button type="button" id="extract-doc-btn" class="file-btn">Or upload a document (PDF, DOCX, TXT)</button>
            <span id="extract-doc-status" class="file-status"></span>
          </div>
        </fieldset>

        <fieldset>
          <legend>Options</legend>
          <div class="option-grid">
            <label>
              <span>Language (for stop-words)</span>
              <select id="extract-lang">
                <option value="english" selected>English</option>
                <option value="spanish">Spanish</option>
                <option value="french">French</option>
                <option value="german">German</option>
                <option value="portuguese">Portuguese</option>
                <option value="italian">Italian</option>
                <option value="dutch">Dutch</option>
              </select>
            </label>
            <label>
              <span>Minimum frequency</span>
              <input type="number" id="extract-min-freq" value="2" min="1" max="100" />
            </label>
          </div>
        </fieldset>

        <div class="actions">
          <button type="button" id="extract-run" class="primary">Extract preset</button>
          <button type="button" id="extract-clear" class="secondary">Clear</button>
        </div>

        <div id="extract-results" class="results"></div>
      </section>
    </main>

    <footer>
      <small>
        Built by AURA Lab at SIUE. Distributed in collaboration with SIM DAD LLC. Runs locally. No upload. No AI.
      </small>
    </footer>

    <script type="module" src="main.js"></script>
  </body>
</html>
